services:
  postgres:
    image: postgres:15-alpine
    container_name: agrochain_pg
    environment:
      POSTGRES_USER: agro_user
      POSTGRES_PASSWORD: agro_password
      POSTGRES_DB: agrochain_db
    ports:
      - "5454:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agrochain_redis
    ports:
      - "6380:6379" 
    restart: unless-stopped

volumes:
  pgdata: